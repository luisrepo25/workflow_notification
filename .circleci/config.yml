version: 2.1

# ──────────────────────────────────────────────
# Orbs
# ──────────────────────────────────────────────
orbs:
  node: circleci/node@7.1.0

# ──────────────────────────────────────────────
# Jobs
# ──────────────────────────────────────────────
jobs:
  # ── Build & Test ────────────────────────────
  build:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Lint code
          command: npm run lint
      - run:
          name: Build application
          command: npm run build
      - run:
          name: Run unit tests
          command: npm test

  # ── Deploy to AWS EC2 ──────────────────────
  deploy:
    docker:
      - image: cimg/base:current
    steps:
      #Add the SSH private key (match the fingerprint you set in CircleCI)
      - add_ssh_keys:
          fingerprints:
            - "SHA256:cJ1W+1/OBU6rnqDS0vp3SCQz2Z1APBroMXuEFRCNlCk"

      #Deploy via SSH
      - run:
          name: Deploy to AWS EC2
          command: |
            echo "🔌 Connecting to ${EC2_USER}@${EC2_IP} ..."
            ssh -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_IP}" "
              set -e
              echo 'Changing to project directory...'
              cd ${EC2_PATH}

              echo 'Pulling latest code...'
              git pull origin main

              echo 'Rebuilding and restarting containers...'
              docker compose down
              docker compose up -d --build

              echo 'Deploy completed successfully!'
            "

# ──────────────────────────────────────────────
# Workflows
# ──────────────────────────────────────────────
workflows:
  build-and-deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: main